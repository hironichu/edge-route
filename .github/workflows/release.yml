name: Release

on:
  push:
    branches:
      - "release/*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release branch
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract release version
        id: version
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          if [[ ! "$branch" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release workflow only accepts branches named release/X.X.X" >&2
            exit 1
          fi
          version="${branch#release/}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Release version: $version"

  build:
    name: build / ${{ matrix.arch }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build release binaries
        run: cargo build --release -p edge-cli -p edge-agent

      - name: Package
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"
          package="edgeroute-${version}-linux-${{ matrix.arch }}"
          mkdir -p "dist/$package"
          cp target/release/edge "dist/$package/"
          cp target/release/edge-agent "dist/$package/"
          cp README.md "dist/$package/"
          cp -R docs "dist/$package/docs"
          cp -R config "dist/$package/config"
          cp -R scripts "dist/$package/scripts"
          cp -R systemd "dist/$package/systemd"
          tar -C dist -czf "dist/${package}.tar.gz" "$package"
          (cd dist && sha256sum "${package}.tar.gz" >"${package}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgeroute-linux-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ needs.validate.outputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes "EdgeRoute ${tag}"
          gh release upload "$tag" dist/* --clobber
