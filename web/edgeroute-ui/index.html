<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>EdgeRoute</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script defer src="/static/htmx.min.js"></script>
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/dashboard" hx-get="/ui/dashboard" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/dashboard">
        <span class="brand-mark">ER</span>
        <span class="brand-text">EdgeRoute</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/dashboard" hx-get="/ui/dashboard" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/dashboard" data-nav="dashboard">Dashboard</a>
        <a href="/mappings" hx-get="/ui/mappings" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/mappings" data-nav="mappings">Mappings</a>
        <a href="/tools" hx-get="/ui/tools" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/tools" data-nav="tools">Tools</a>
        <a href="/topology" hx-get="/ui/topology" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/topology" data-nav="topology">Topology</a>
        <a href="/oracle" hx-get="/ui/oracle" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/oracle" data-nav="oracle">Oracle</a>
        <a href="/reconcile" hx-get="/ui/reconcile" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/reconcile" data-nav="reconcile">Reconcile</a>
        <a href="/netbird" hx-get="/ui/netbird" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/netbird" data-nav="netbird">NetBird</a>
        <a href="/logs" hx-get="/ui/logs" hx-target="#view" hx-swap="innerHTML transition:true" hx-push-url="/logs" data-nav="logs">Logs</a>
      </nav>
      <div class="topbar-end">
        <button type="button" class="cmdk-hint" id="cmdk-open">
          <span>Command</span>
          <kbd>⌘K</kbd>
        </button>
        <span class="conn" title="NetBird-restricted gateway">
          <span class="conn-dot"></span>
          <span>netbird</span>
        </span>
      </div>
    </header>

    <main id="view" class="view" tabindex="-1">
      <div class="loading">Loading EdgeRoute…</div>
    </main>

    <dialog id="cmdk" class="cmdk" aria-label="Command palette">
      <div class="cmdk-box">
        <input id="cmdk-input" class="cmdk-input" type="text" placeholder="Jump to dashboard, mappings, tools…" autocomplete="off" />
        <ul id="cmdk-list" class="cmdk-list"></ul>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
